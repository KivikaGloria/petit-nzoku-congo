<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nettoie le fleuve Congo - Petit Nzoku</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="nettoye-fleuve.css">
    
</head>
<body>
    <header>
        <h1>🌊 Nettoie le fleuve Congo</h1>
        <p>Aide à protéger notre environnement !</p>
    </header>

    <main>
        <div class="carte-jeu">
    <div class="emoji-jeu">🌊</div>
    <h3>Nettoie le fleuve Congo</h3>
    <p>Protège notre environnement</p>
    <p class="details">♻️ 4 niveaux · Conseils écolos</p>
</div>
        <div class="jeu-container">
            <!-- En-tête du jeu -->
            <div class="jeu-header">
                <div class="score-box">
                    <span class="score-label">Déchets collectés</span>
                    <span class="score-valeur" id="score">0</span>
                    <span class="score-max" id="total-dechets">10</span>
                </div>
                
                <div class="timer-box" id="timer">
                    ⏱️ <span id="temps">60</span>s
                </div>
                
                <div class="niveau-box">
                    Niveau <span id="niveau">1</span>
                </div>
            </div>

            <!-- Zone de jeu (canvas) -->
            <div class="canvas-container">
                <canvas id="jeuCanvas" width="800" height="400"></canvas>
            </div>

            <!-- Messages éducatifs -->
            <div class="message-educatif" id="messageEducatif" style="display: none;">
                <p id="messageTexte"></p>
            </div>

            <!-- Bouton recommencer -->
            <div class="controles">
                <button id="btn-recommencer" class="bouton">🔄 Recommencer</button>
                <button id="btn-niveau-suivant" class="bouton" style="display: none;">➡️ Niveau suivant</button>
            </div>

            <!-- Conseils écologiques -->
            <div class="conseils-eco">
                <h3>🌍 Le savais-tu ?</h3>
                <p id="conseil">Clique sur les déchets pour nettoyer le fleuve !</p>
            </div>

            <!-- Options d'accessibilité -->
            <div class="options-accessibilite">
                <h3>🖐️ Options</h3>
                <div class="option-grille">
                    <div class="option">
                        <label class="switch-label">
                            <span class="option-emoji">🔊</span> Sons
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="mode-son" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <a href="../index.html" class="bouton">← Retour à l'accueil</a>
    </footer>

    <script src="nettoye-fleuve.js"></script>
</body>
</html>
