<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory des animaux - Petit Nzoku</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="memory-animaux.css">
</head>
<body>
    <header>
        <h1>🐘 Memory des animaux du Congo</h1>
        <p>Trouve toutes les paires d'animaux !</p>
    </header>

    <main>
        <div class="memory-container">
            <!-- En-tête du jeu -->
           <div class="memory-header" style="text-align:center; margin-bottom:20px;">
    <h3 id="niveau-display" style="color: #009639;">Niveau 1 / 4</h3>
    <p>Coups : <b id="coups">0</b></p>
</div>
<div id="memory-grid"></div>

            <!-- Grille du memory -->
            <div class="memory-grid" id="memory-grid">
                <!-- Les cartes seront générées par JS -->
            </div>

            <!-- Contrôles -->
            <div class="memory-controles">
                <button id="btn-nouveau" class="bouton">🔄 Nouvelle partie</button>
                <button id="btn-niveau-suivant" class="bouton" style="display: none;">➡️ Niveau suivant</button>
            </div>

            <!-- Message de félicitations -->
            <div class="message-felicitations" id="messageFelicitations" style="display: none;">
                <p id="messageTexte"></p>
            </div>

            <!-- Options d'accessibilité -->
            <div class="options-accessibilite">
                <h3>🖐️ Options</h3>
                <div class="option-grille">
                    <div class="option">
                        <label class="switch-label">
                            <span class="option-emoji">🔊</span> Sons
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="mode-son" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <a href="../index.html" class="bouton">← Retour à l'accueil</a>
    </footer>

    <script src="memory-animaux.js"></script>
</body>
</html>
